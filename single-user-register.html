<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Single User Registration</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        
        .animate-fadeIn { animation: fadeIn 0.6s ease-out; }
        .animate-float { animation: float 3s ease-in-out infinite; }
        
        .gradient-text {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-50 via-white to-sky-50 py-12 px-4">
    
    <div class="max-w-4xl mx-auto animate-fadeIn">
        
        <!-- Logo and Header -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-br from-blue-500 to-blue-600 rounded-2xl shadow-lg mb-4 animate-float">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                </svg>
            </div>
            <h1 class="text-3xl font-bold gradient-text mb-2">User Registration</h1>
            <p class="text-gray-600">Register to request food assistance</p>
            <p class="text-sm text-gray-500 mt-2">Already have an account? <a href="/" class="text-blue-600 hover:text-blue-700 font-semibold">Login Here</a></p>
        </div>

        <!-- Registration Card -->
        <div class="bg-white rounded-3xl shadow-2xl p-8 border border-gray-100">
            
            <!-- Role Selector -->
            <div class="mb-8 pb-6 border-b border-gray-200">
                <label class="block text-sm font-semibold text-gray-700 mb-3">Register As:</label>
                <select id="role" onchange="window.location.href=this.value;" class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-blue-500 focus:ring-4 focus:ring-blue-100 focus:outline-none transition-all cursor-pointer">
                    <option value="{{ url_for('restaurantRegister') }}">Restaurant/Food Supplier</option>
                    <option value="{{ url_for('ngoRegister') }}">NGO/Ashram Head</option>
                    <option value="{{ url_for('adminRegister') }}">Admin</option>
                    <option value="{{ url_for('singleRegister') }}" selected>Single Requester</option>
                </select>
            </div>

            <form method="post">
                <input type="text" name="role" value="Single User" hidden>
                
                <div class="grid md:grid-cols-2 gap-8">
                    
                    <!-- Personal Information Section -->
                    <div class="space-y-5">
                        <div>
                            <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">
                                <div class="w-8 h-8 bg-blue-100 rounded-lg flex items-center justify-center">
                                    <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                                    </svg>
                                </div>
                                Personal Information
                            </h3>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">Your Name *</label>
                            <input 
                                type="text" 
                                name="name" 
                                required
                                class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-blue-500 focus:ring-4 focus:ring-blue-100 focus:outline-none transition-all"
                                placeholder="Full name"
                            >
                        </div>

                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">Email Address *</label>
                            <input 
                                type="email" 
                                name="email" 
                                required
                                class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-blue-500 focus:ring-4 focus:ring-blue-100 focus:outline-none transition-all"
                                placeholder="your@email.com"
                            >
                        </div>

                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">Password *</label>
                            <input 
                                type="password" 
                                name="password" 
                                required
                                class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-blue-500 focus:ring-4 focus:ring-blue-100 focus:outline-none transition-all"
                                placeholder="Create a password"
                            >
                        </div>
                    </div>

                    <!-- Contact Information Section -->
                    <div class="space-y-5">
                        <div>
                            <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">
                                <div class="w-8 h-8 bg-blue-100 rounded-lg flex items-center justify-center">
                                    <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path>
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                    </svg>
                                </div>
                                Contact Details
                            </h3>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">Address *</label>
                            <textarea 
                                name="address" 
                                rows="4"
                                required
                                class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-blue-500 focus:ring-4 focus:ring-blue-100 focus:outline-none transition-all resize-none"
                                placeholder="Your complete address"
                            ></textarea>
                        </div>

                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">Contact Number *</label>
                            <input 
                                type="tel" 
                                name="contact" 
                                required
                                class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-blue-500 focus:ring-4 focus:ring-blue-100 focus:outline-none transition-all"
                                placeholder="Phone number"
                            >
                        </div>

                        <!-- Info Box -->
                        <div class="bg-blue-50 border-2 border-blue-200 rounded-xl p-4">
                            <div class="flex gap-3">
                                <svg class="w-5 h-5 text-blue-600 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                                </svg>
                                <div>
                                    <p class="text-sm font-semibold text-blue-900 mb-1">Privacy Notice</p>
                                    <p class="text-xs text-blue-700">Your information is kept private and secure. We only use it to connect you with food donors.</p>
                                </div>
                            </div>
                        </div>
                    </div>

                </div>

                <!-- Register Button -->
                <div class="mt-8">
                    <button 
                        type="submit" 
                        class="w-full bg-gradient-to-r from-blue-600 to-sky-600 text-white py-4 rounded-xl font-semibold hover:from-blue-700 hover:to-sky-700 transform hover:scale-[1.01] transition-all duration-200 shadow-lg hover:shadow-xl"
                    >
                        Create Account
                    </button>
                </div>
            </form>
        </div>

        <!-- Footer -->
        <p class="text-center text-sm text-gray-500 mt-6">
            By registering, you agree to our <a href="#" class="text-blue-600 hover:underline">Terms</a> and <a href="#" class="text-blue-600 hover:underline">Privacy Policy</a>
        </p>
    </div>

</body>
</html>
