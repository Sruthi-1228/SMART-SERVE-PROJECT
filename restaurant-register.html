<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Registration</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        
        .animate-fadeIn { animation: fadeIn 0.6s ease-out; }
        .animate-float { animation: float 3s ease-in-out infinite; }
        
        .gradient-text {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-green-50 via-white to-emerald-50 py-12 px-4">
    
    <div class="max-w-4xl mx-auto animate-fadeIn">
        
        <!-- Logo and Header -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-br from-orange-500 to-orange-600 rounded-2xl shadow-lg mb-4 animate-float">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path>
                </svg>
            </div>
            <h1 class="text-3xl font-bold gradient-text mb-2">Restaurant Registration</h1>
            <p class="text-gray-600">Join us in fighting food waste</p>
            <p class="text-sm text-gray-500 mt-2">Already have an account? <a href="/" class="text-green-600 hover:text-green-700 font-semibold">Login Here</a></p>
        </div>

        <!-- Registration Card -->
        <div class="bg-white rounded-3xl shadow-2xl p-8 border border-gray-100">
            
            <!-- Role Selector -->
            <div class="mb-8 pb-6 border-b border-gray-200">
                <label class="block text-sm font-semibold text-gray-700 mb-3">Register As:</label>
                <select id="role" onchange="window.location.href=this.value;" class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-green-500 focus:ring-4 focus:ring-green-100 focus:outline-none transition-all cursor-pointer">
                    <option value="{{ url_for('restaurantRegister') }}" selected>Restaurant/Food Supplier</option>
                    <option value="{{ url_for('ngoRegister') }}">NGO/Ashram Head</option>
                    <option value="{{ url_for('adminRegister') }}">Admin</option>
                    <option value="{{ url_for('singleRegister') }}">Single Requester</option>
                </select>
            </div>

            <form method="post">
                <input type="text" name="role" value="Restaurant Owner" hidden>
                
                <div class="grid md:grid-cols-2 gap-8">
                    
                    <!-- Personal Information Section -->
                    <div class="space-y-5">
                        <div>
                            <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">
                                <div class="w-8 h-8 bg-green-100 rounded-lg flex items-center justify-center">
                                    <svg class="w-5 h-5 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                                    </svg>
                                </div>
                                Personal Information
                            </h3>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">Your Name *</label>
                            <input 
                                type="text" 
                                name="name" 
                                required
                                class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-green-500 focus:ring-4 focus:ring-green-100 focus:outline-none transition-all"
                                placeholder="John Doe"
                            >
                        </div>

                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">Email Address *</label>
                            <input 
                                type="email" 
                                name="email" 
                                required
                                class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-green-500 focus:ring-4 focus:ring-green-100 focus:outline-none transition-all"
                                placeholder="your@email.com"
                            >
                        </div>

                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">Password *</label>
                            <input 
                                type="password" 
                                name="password" 
                                required
                                class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-green-500 focus:ring-4 focus:ring-green-100 focus:outline-none transition-all"
                                placeholder="Create a strong password"
                            >
                        </div>
                    </div>

                    <!-- Restaurant Information Section -->
                    <div class="space-y-5">
                        <div>
                            <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">
                                <div class="w-8 h-8 bg-orange-100 rounded-lg flex items-center justify-center">
                                    <svg class="w-5 h-5 text-orange-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path>
                                    </svg>
                                </div>
                                Restaurant Details
                            </h3>
                            <p class="text-xs text-gray-500 mb-4">Or your personal info if you're an individual donor</p>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">Restaurant Name *</label>
                            <input 
                                type="text" 
                                name="rname" 
                                required
                                class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-green-500 focus:ring-4 focus:ring-green-100 focus:outline-none transition-all"
                                placeholder="Restaurant name"
                            >
                        </div>

                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">Restaurant Address *</label>
                            <input 
                                type="text" 
                                name="raddress" 
                                required
                                class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-green-500 focus:ring-4 focus:ring-green-100 focus:outline-none transition-all"
                                placeholder="Complete address"
                            >
                        </div>

                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">License Number *</label>
                            <input 
                                type="text" 
                                name="rlicense" 
                                required
                                class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-green-500 focus:ring-4 focus:ring-green-100 focus:outline-none transition-all"
                                placeholder="License or registration number"
                            >
                        </div>
                    </div>

                </div>

                <!-- Register Button -->
                <div class="mt-8">
                    <button 
                        type="submit" 
                        class="w-full bg-gradient-to-r from-green-600 to-emerald-600 text-white py-4 rounded-xl font-semibold hover:from-green-700 hover:to-emerald-700 transform hover:scale-[1.01] transition-all duration-200 shadow-lg hover:shadow-xl"
                    >
                        Create Account
                    </button>
                </div>
            </form>
        </div>

        <!-- Footer -->
        <p class="text-center text-sm text-gray-500 mt-6">
            By registering, you agree to our <a href="#" class="text-green-600 hover:underline">Terms</a> and <a href="#" class="text-green-600 hover:underline">Privacy Policy</a>
        </p>
    </div>

</body>
</html>
